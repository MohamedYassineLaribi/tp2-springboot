<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{template}">

<head>
    <meta charset="UTF-8">
    <title>Formulaire Etudiant</title>
</head>

<body>
    <div layout:fragment="MyContent">
        <div class="container mt-5">
            <div class="card">
                <!-- En-tête dynamique selon le mode -->
                <div class="card-header" th:if="${mode == 'new'}">Ajouter un Etudiant</div>
                <div class="card-header" th:if="${mode == 'edit'}">Modifier un Etudiant</div>

                <div class="card-body">
                    <form th:action="@{saveEtudiant}" method="post" th:object="${etudiant}">

                        <!-- ID caché (pour la modification) -->
                        <input type="hidden" th:field="*{idEtudiant}" />

                        <!-- Pagination cachée -->
                        <input type="hidden" name="page" th:value="${page != null ? page : 0}" />
                        <input type="hidden" name="size" th:value="${size != null ? size : 2}" />

                        <!-- Nom -->
                        <div class="form-group">
                            <label class="control-label">Nom Etudiant :</label>
                            <input type="text" th:field="*{nomEtudiant}" class="form-control" />
                            <span th:if="${#fields.hasErrors('nomEtudiant')}" th:errors="*{nomEtudiant}"
                                class="text-danger"></span>
                        </div>

                        <!-- Prénom -->
                        <div class="form-group">
                            <label class="control-label">Prénom Etudiant :</label>
                            <input type="text" th:field="*{prenomEtudiant}" class="form-control" />
                            <span th:if="${#fields.hasErrors('prenomEtudiant')}" th:errors="*{prenomEtudiant}"
                                class="text-danger"></span>
                        </div>

                        <!-- Classe -->
                        <div class="form-group">
                            <label class="control-label">Classe :</label>
                            <select th:field="*{classe.idClasse}" class="form-control">
                                <option value="">-- Choisir une classe --</option>
                                <option th:each="c : ${classes}" th:value="${c.idClasse}" th:text="${c.nomClasse}">
                                </option>
                            </select>
                            <span th:if="${#fields.hasErrors('classe')}" th:errors="*{classe}"
                                class="text-danger"></span>
                        </div>

                        <!-- Date de naissance -->
                        <div class="form-group">
                            <label class="control-label">Date de Naissance :</label>
                            <input type="date" th:field="*{dateNaissance}" class="form-control" />
                            <span th:if="${#fields.hasErrors('dateNaissance')}" th:errors="*{dateNaissance}"
                                class="text-danger"></span>
                        </div>

                        <!-- Email -->
                        <div class="form-group">
                            <label class="control-label">Email :</label>
                            <input type="text" th:field="*{email}" class="form-control" />
                            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary px-4">Valider</button>
                            <a th:href="@{ListeEtudiants}" class="btn btn-outline-secondary ml-2">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
