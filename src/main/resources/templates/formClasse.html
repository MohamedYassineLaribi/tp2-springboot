<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{template}">

<head>
    <meta charset="UTF-8">
    <title th:text="${mode == 'edit' ? 'Modifier Classe' : 'Ajouter Classe'}"></title>
</head>

<body>
    <div layout:fragment="MyContent">
        <div class="container mt-5">
            <div class="card">
                <div class="card-header"
                    th:text="${mode == 'edit' ? 'Modifier Classe' : 'Ajouter Classe'}"></div>
                <div class="card-body">
                    <form th:action="${mode == 'edit' ? 'updateClasse' : 'saveClasse'}" method="post"
                        th:object="${classe}">
                        <div class="form-group" th:if="${mode == 'edit'}">
                            <label class="control-label">ID Classe :</label>
                            <input type="text" th:field="*{idClasse}" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label class="control-label">Nom Classe :</label>
                            <input type="text" th:field="*{nomClasse}" class="form-control" />
                        </div>
                        <div>
                            <button type="submit" class="btn btn-primary">Valider</button>
                        </div>
                    </form>
                    <a th:href="@{ListeClasses}" class="btn btn-link mt-3">Liste des Classes</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
